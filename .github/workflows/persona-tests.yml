name: Persona tests

# Runs the full persona/agent test suite whenever code lands on main, then posts
# a ranked list of issues to a GitHub issue and to the run's summary so it is easy
# to see at a glance. This is a POST-merge report, not a merge gate.
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "client/**"
      - "groundwork_local_test/**"
      - ".github/workflows/persona-tests.yml"
  workflow_dispatch: {} # allow manual runs

concurrency:
  group: persona-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  persona:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write # to open/update the findings issue

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: groundwork
          POSTGRES_PASSWORD: groundwork
          POSTGRES_DB: groundwork_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U groundwork"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://groundwork:groundwork@127.0.0.1:5432/groundwork_test
      NODE_ENV: development
      PORT: "3000"
      CORS_ORIGINS: http://127.0.0.1:5173
      FRONTEND_URL: http://127.0.0.1:5173
      JWT_SECRET: ci-test-secret-not-for-production
      BILLING_ENABLED: "false"
      # Mail: email.service isDev() accepts exactly re_test / re_... / empty as
      # dev-mode keys ('placeholder' was NOT recognized - the API tried real
      # Resend and every entry-save 500d with 'API key is invalid').
      RESEND_API_KEY: re_test
      # AI: Gemini via Vertex. Report-generation suites need real creds; without
      # them those suites will BLOCK rather than fail. Add the secret to light them up.
      GEMINI_PROJECT_ID: ${{ secrets.GEMINI_PROJECT_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      # VITE_API_URL is deliberately UNSET: the Vite dev proxy keeps every
      # API call same-origin (no CORS), matching how the suites run locally.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --- Install ---
      - name: Install API deps
        working-directory: api
        run: npm ci

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Install Python + Playwright
        run: |
          pip install playwright aiosmtpd
          python -m playwright install --with-deps chromium

      # --- Database ---
      - name: Apply migrations
        working-directory: api
        run: npx prisma migrate deploy

      # --- Boot the stack ---
      - name: Start mail catcher
        working-directory: groundwork_local_test
        run: |
          python mailcatcher.py > mailcatcher.log 2>&1 &
          # HARD wait: the old loop exited 0 even when the catcher never came
          # up (it crashed on a missing dep in every run and nothing noticed).
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:1080/health && exit 0 || sleep 1
          done
          echo "::error::mailcatcher never became healthy"; cat mailcatcher.log; exit 1

      - name: Start API
        working-directory: api
        run: |
          npm run build
          node dist/main > api.log 2>&1 &
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:3000/health && exit 0 || sleep 2
          done
          echo "::error::API never became healthy"; tail -50 api.log; exit 1

      - name: Start client
        working-directory: client
        run: |
          npm run dev -- --port 5173 --host 127.0.0.1 > client.log 2>&1 &
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:5173 && exit 0 || sleep 2
          done
          echo "::error::client never became healthy"; tail -50 client.log; exit 1

      # --- HARD GATE: the loop must provably work before any persona "runs".
      # No continue-on-error: if preflight fails, this run FAILS. A suite that
      # cannot run must never report green.
      - name: Preflight (hard gate)
        working-directory: groundwork_local_test
        run: python preflight.py --base-url http://127.0.0.1:3000

      # --- Run the suites ---
      # HONESTY RULES (this step used to swallow everything and report green
      # with ZERO runners present):
      #  - a listed runner that does not exist  -> the run FAILS
      #  - a runner that crashes (non-zero)     -> the run FAILS (all suites
      #    still execute first so one crash does not hide another's findings)
      #  - findings are NOT failures: runners exit 0 and report via
      #    results/**/findings.json; the aggregator ranks them.
      - name: Run persona suites
        working-directory: groundwork_local_test
        run: |
          RUNNERS="run_suite_v_vanish.py run_suite_m_sessions.py run_suite_b_billing.py run_suite_l_layout.py"
          MISSING=""
          for runner in $RUNNERS; do
            [ -f "$runner" ] || MISSING="$MISSING $runner"
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Persona runners MISSING:$MISSING - the suite cannot run. Failing red (a missing test is not a passing test)."
            exit 1
          fi
          CRASHED=""
          for runner in $RUNNERS; do
            echo "::group::$runner"
            if ! python "$runner"; then
              echo "::error::$runner crashed (non-zero exit)"
              CRASHED="$CRASHED $runner"
            fi
            echo "::endgroup::"
          done
          if [ -n "$CRASHED" ]; then
            echo "::error::Crashed runners:$CRASHED"
            exit 1
          fi

      # --- Aggregate and surface ---
      # The aggregator's exit code is the CRITICAL count (a report, not a
      # crash) - capture it without failing, but a missing ISSUES.md means the
      # aggregation itself broke, and that DOES fail the run.
      - name: Aggregate findings
        id: agg
        if: always()
        working-directory: groundwork_local_test
        run: |
          set +e
          python aggregate_findings.py
          CRITICALS=$?
          set -e
          echo "criticals=$CRITICALS" >> "$GITHUB_OUTPUT"
          if [ ! -f results/ISSUES.md ]; then
            echo "::error::aggregate_findings.py produced no results/ISSUES.md - aggregation broke."
            exit 1
          fi

      - name: Write job summary
        if: always()
        run: |
          if [ -f groundwork_local_test/results/ISSUES.md ]; then
            cat groundwork_local_test/results/ISSUES.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No ISSUES.md produced — the suite did not complete. Check logs." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post issues list to a GitHub issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=groundwork_local_test/results/ISSUES.md
          [ -f "$BODY" ] || { echo "no ISSUES.md, skipping issue post"; exit 0; }
          SHA_SHORT=$(git rev-parse --short HEAD)
          TITLE="Persona test findings"
          # Find an existing open issue with this exact title and update it; else create.
          NUM=$(gh issue list --state open --search "\"$TITLE\" in:title" --json number,title \
                --jq ".[] | select(.title==\"$TITLE\") | .number" | head -n1)
          {
            echo "_Latest run: commit \`$SHA_SHORT\` · [run log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"
            echo ""
            cat "$BODY"
          } > /tmp/issue_body.md
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --body-file /tmp/issue_body.md
            gh issue comment "$NUM" --body "Updated with findings from \`$SHA_SHORT\`. See body above."
            echo "Updated issue #$NUM"
          else
            gh issue create --title "$TITLE" --body-file /tmp/issue_body.md \
              --assignee "${{ github.actor }}"
            echo "Created new findings issue"
          fi

      - name: Upload screenshots and raw findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persona-results
          path: |
            groundwork_local_test/results/**
            groundwork_local_test/*.log
            api/api.log
            client/client.log
          retention-days: 14
