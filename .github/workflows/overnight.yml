name: Overnight persona suite

# Runs the full persona/agent test suite whenever code lands on main, then posts
# a ranked list of issues to a GitHub issue and to the run's summary so it is easy
# to see at a glance. This is a POST-merge report, not a merge gate.
on:
  schedule:
    - cron: '0 3 * * *' # nightly deep run, separate from the PR gate
  workflow_dispatch:
    inputs:
      prove_red:
        description: 'Seed a labeled synthetic critical to PROVE the notify path (never a real finding)'
        type: boolean
        default: false

concurrency:
  group: overnight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  persona:
    runs-on: ubuntu-latest
    timeout-minutes: 75 # --target both boots + suites twice (LOCAL then MAIN), not once
    permissions:
      contents: read
      issues: write # to open/update the findings issue

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: groundwork
          POSTGRES_PASSWORD: groundwork
          POSTGRES_DB: groundwork_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U groundwork"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: development
      PORT: "3000"
      CORS_ORIGINS: http://127.0.0.1:5173
      FRONTEND_URL: http://127.0.0.1:5173
      JWT_SECRET: ci-test-secret-not-for-production
      BILLING_ENABLED: "false"
      # Mail: email.service isDev() accepts exactly re_test / re_... / empty as
      # dev-mode keys ('placeholder' was NOT recognized - the API tried real
      # Resend and every entry-save 500d with 'API key is invalid').
      RESEND_API_KEY: re_test
      # AI: Gemini via Vertex. Report-generation suites need real creds; without
      # them those suites will BLOCK rather than fail. Add the secret to light them up.
      GEMINI_PROJECT_ID: ${{ secrets.GEMINI_PROJECT_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      # VITE_API_URL is deliberately UNSET: the Vite dev proxy keeps every
      # API call same-origin (no CORS), matching how the suites run locally.
      # --target both owns every DB itself (fresh_db() per target, spec 0) via
      # bare `createdb`/`dropdb` - those read PG* env vars, not DATABASE_URL,
      # so they must point at this job's postgres service explicitly or they
      # try a local Unix socket that does not exist in this container.
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: groundwork
      PGPASSWORD: groundwork

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --- Install ---
      - name: Install API deps
        working-directory: api
        run: npm ci

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Install Python + Playwright
        run: |
          pip install playwright aiosmtpd
          python -m playwright install --with-deps chromium

      # --- Mail catcher: shared across both targets, idempotent (ensure_mailcatcher()
      # in the orchestrator would start it anyway - pre-starting it here just
      # separates a mailcatcher-specific failure from a generic environment abort).
      - name: Start mail catcher
        working-directory: groundwork_local_test
        run: |
          python mailcatcher.py > mailcatcher.log 2>&1 &
          # HARD wait: the old loop exited 0 even when the catcher never came
          # up (it crashed on a missing dep in every run and nothing noticed).
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:1080/health && exit 0 || sleep 1
          done
          echo "::error::mailcatcher never became healthy"; cat mailcatcher.log; exit 1

      # --- The overnight orchestrator: --target both owns every process and DB
      # lifecycle itself (LOCAL then MAIN, each on a fresh DB, spec 0) - it must
      # own ports 3000/5173 itself, so there is no separate boot/preflight step
      # here the way --target local's fast dev loop has one. Self-test runs
      # first against LOCAL; every suite runs against both; report prints both
      # SHAs and the LOCAL/MAIN diff.
      - name: Overnight run
        working-directory: groundwork_local_test
        env:
          GW_MODEL_TURN_BUDGET: "80" # Phase C: an unattended run cannot burn the API budget
          GW_PROVE_RED: ${{ inputs.prove_red && '1' || '0' }}
        run: |
          python overnight/run_overnight.py --target both

      # --- Notify on red: critical>0, guard-no-bite, or env-abort all fail the
      #     job, and failure lands here (spec 8) ---
      - name: Notify on red (GitHub issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const base = 'groundwork_local_test/results';
            let body = 'The overnight run went RED but no CRITICAL-ISSUES.md was found - check the workflow log.';
            try {
              const dirs = fs.readdirSync(base).filter(d => d.startsWith('overnight-')).sort();
              for (let i = dirs.length - 1; i >= 0; i--) {
                const f = path.join(base, dirs[i], 'CRITICAL-ISSUES.md');
                if (fs.existsSync(f)) { body = fs.readFileSync(f, 'utf8'); break; }
              }
            } catch (e) { body += `\n(reader error: ${e.message})`; }
            const runLink = `\n\n---\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const open = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'overnight-red' });
            if (open.data.length) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: open.data[0].number, body: body + runLink });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: '🔴 Overnight persona suite RED', body: body + runLink, labels: ['overnight-red'] });
            }

      - name: Upload screenshots and raw findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persona-results
          path: |
            groundwork_local_test/results/**
            groundwork_local_test/*.log
          retention-days: 14
