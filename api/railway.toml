[build]
builder = "NIXPACKS"
buildCommand = "npm run build && npx prisma generate"

[deploy]
startCommand = "npx prisma migrate resolve --rolled-back 20260627000000_contributor_code_system 2>/dev/null; npx prisma migrate deploy && npm run prisma:seed && node dist/main"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
